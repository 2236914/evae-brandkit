<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evae Brand Kit Pages</title>
  <style>
    :root {
      --void: #0d0d0d;
      --carbon: #2b2b2e;
      --graphite: #3a3d41;
      --smoke: #6f7278;
      --sand: #d8d3c8;
      --ivory: #f5f1e8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top right, #1a1a1d 0%, var(--void) 55%);
      color: var(--ivory);
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .wrap {
      width: min(760px, 100%);
      background: rgba(43, 43, 46, 0.7);
      border: 1px solid var(--graphite);
      border-radius: 16px;
      padding: 28px;
      backdrop-filter: blur(4px);
    }

    h1 {
      font-size: clamp(24px, 4vw, 36px);
      font-weight: 500;
      margin-bottom: 8px;
      letter-spacing: 0.3px;
    }

    p {
      color: var(--smoke);
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .links {
      display: grid;
      gap: 12px;
    }

    a {
      display: block;
      text-decoration: none;
      background: var(--void);
      border: 1px solid var(--graphite);
      color: var(--ivory);
      padding: 14px 16px;
      border-radius: 10px;
      transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    }

    a:hover {
      transform: translateY(-1px);
      border-color: var(--sand);
      background: #141416;
    }

    .label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .file {
      display: block;
      font-size: 12px;
      color: var(--smoke);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Evae Brand Kit</h1>
    <p>Select a version to open:</p>

    <section class="links">
      <a href="evae-brand-kit-v2.html">
        <span class="label">Brand Kit V2</span>
        <span class="file">evae-brand-kit-v2.html</span>
      </a>

      <a href="evae-brand-kit-v3.html">
        <span class="label">Brand Kit V3</span>
        <span class="file">evae-brand-kit-v3.html</span>
      </a>

      <a href="evae-brand-kit-v4.html">
        <span class="label">Brand Kit V4</span>
        <span class="file">evae-brand-kit-v4.html</span>
      </a>
    </section>
  </main>
</body>
</html>
